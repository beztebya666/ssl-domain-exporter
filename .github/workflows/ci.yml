name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Go test
        run: go test ./...
      - name: Go build
        run: go build ./cmd/server

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.17.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - name: Install root helpers
        run: npm ci
      - name: Install frontend
        run: npm --prefix frontend ci
      - name: Root npm audit
        run: npm audit
      - name: Frontend npm audit
        run: npm --prefix frontend audit
      - name: Frontend build
        run: npm run build

  release-hardening:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20.17.0
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - name: Install root helpers
        run: npm ci
      - name: Install frontend
        run: npm --prefix frontend ci
      - name: Full release check
        run: make release-check

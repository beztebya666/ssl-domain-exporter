name: Deploy demo to GitHub Pages

# Static, in-browser demo (mock backend) → https://beztebya666.github.io/ssl-domain-exporter/
on:
  push:
    branches: [main, master]
    paths: ["frontend/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Build demo bundle
        working-directory: frontend
        env:
          VITE_DEMO: "1"
          VITE_BASE: "/ssl-domain-exporter/"
        run: npm run build
      - name: SPA fallback
        run: cp frontend/dist/index.html frontend/dist/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
